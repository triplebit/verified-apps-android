# Builds a signed release APK and publishes it to a GitHub Release.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64  — release keystore file, base64-encoded
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

name: Build Release

on:
  push:
    tags:
      - "[0-9][0-9].[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      path: ${{ steps.apk.outputs.path }}
      idsig: ${{ steps.apk.outputs.idsig }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - name: Verify version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          GRADLE_VERSION=$(awk '
            /releaseVersionYear =/{ y=$NF }
            /releaseVersionMonth =/{ m=$NF }
            /releaseVersionPatch =/{ p=$NF; sub(/,.*/, "", p) }
            END { printf "%d.%d.%d", y, m, p }
          ' app/build.gradle.kts)
          if [ "$GRADLE_VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch: app/build.gradle.kts is ${GRADLE_VERSION}, but release tag is ${TAG}."
            exit 1
          fi
          echo "Version ${GRADLE_VERSION} matches tag ${TAG}."

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 secret. Add release signing secrets before publishing."
            exit 1
          fi
          KEYSTORE_PATH="${{ runner.temp }}/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
        id: keystore

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Pin SOURCE_DATE_EPOCH to the tag's commit time so the release build is
        # byte-for-byte reproducible by verify-reproducible.yml.
        run: SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) ./gradlew :app:assembleRelease --no-daemon

      - name: Package release APK
        id: apk
        env:
          TAG: ${{ github.ref_name }}
        run: |
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/app-release.apk"
          IDSIG_SRC="app/build/outputs/apk/release/app-release.apk.idsig"
          if [ -f "$SIGNED" ]; then
            APK="$SIGNED"
          elif [ -f "$UNSIGNED" ]; then
            echo "::error::Release APK is unsigned. Check ANDROID_KEYSTORE_* secrets and signing config."
            exit 1
          else
            echo "::error::No release APK found under app/build/outputs/apk/release/"
            exit 1
          fi
          if [ ! -f "$IDSIG_SRC" ]; then
            echo "::error::APK Signature Scheme v4 sidecar (.idsig) not found. Ensure enableV4Signing = true in the release signing config."
            exit 1
          fi
          APK_ASSET="VerifiedApps-${TAG}.apk"
          IDSIG_ASSET="VerifiedApps-${TAG}.apk.idsig"
          cp "$APK" "$APK_ASSET"
          cp "$IDSIG_SRC" "$IDSIG_ASSET"
          echo "path=${APK_ASSET}" >> "$GITHUB_OUTPUT"
          echo "idsig=${IDSIG_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.idsig }}

  mobsf:
    name: MobSF Security Scan
    needs: build
    runs-on: ubuntu-latest
    # Informational only: the `release` job depends on [build, attest], not this
    # job, so a MobSF failure never blocks publishing.
    #
    # MOBSF_API_KEY is not a secret: the container is reachable only from
    # localhost on the ephemeral runner and is destroyed when the job ends.
    env:
      MOBSF_API_KEY: ci-ephemeral-key
    steps:
      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      # Run MobSF ourselves rather than as a `services:` container: its ~80s
      # boot (JADX download + DB migrations) exceeds GitHub's service
      # healthcheck window, so a service container is killed as "unhealthy"
      # before any step runs. Here we own the readiness wait instead.
      - name: Start MobSF
        run: |
          docker run -d --name mobsf \
            -e MOBSF_API_KEY="$MOBSF_API_KEY" \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8000/; then
              echo "MobSF is up after $((i * 5))s."
              exit 0
            fi
            sleep 5
          done
          echo "::error::MobSF did not become ready within 300s."
          docker logs mobsf
          exit 1

      - name: Scan APK
        run: |
          APK="${{ needs.build.outputs.path }}"
          echo "Scanning: $APK"

          HASH=$(curl -sf -F "file=@$APK" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/upload | jq -r .hash)
          echo "Upload hash: $HASH"

          curl -sf -X POST --max-time 600 \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scan > /dev/null

          # Suppress confirmed false positives before pulling the report so the
          # scorecard recomputes without them. Both rules only ever match R8-
          # minified third-party code (AndroidX/Compose/Kotlin), never our own
          # sources: android_insecure_random fires on non-cryptographic
          # java.util.Random use in those libraries (our only crypto is SHA-256
          # MessageDigest, which uses no RNG), and android_hardcoded is a regex
          # hit on library constants (MobSF's secret extractor finds nothing).
          # The container is ephemeral, so these must be re-applied every run.
          # Non-fatal (no -f): a suppression API change must not fail this
          # informational job or lose the report artifact.
          for RULE in android_insecure_random android_hardcoded; do
            if curl -s -X POST \
              -d "hash=$HASH" \
              -d "type=code" \
              -d "rule=$RULE" \
              -H "Authorization: $MOBSF_API_KEY" \
              http://localhost:8000/api/v1/suppress_by_rule | jq -e '.response == "ok"' > /dev/null; then
              echo "Suppressed false-positive rule: $RULE"
            else
              echo "::warning::Could not suppress rule $RULE (MobSF API may have changed)"
            fi
          done

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/report_json > mobsf-report.json

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scorecard > mobsf-scorecard.json

          # Defensive extraction: tolerate schema changes without failing the step.
          echo "## MobSF AppSec Scorecard" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security score: $(jq -r '.security_score // "N/A"' mobsf-scorecard.json)/100" >> "$GITHUB_STEP_SUMMARY"
          echo "- High: $(jq -r '.high | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Warning: $(jq -r '.warning | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Info: $(jq -r '.info | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Suppressed false positives (library-only): \`android_insecure_random\`, \`android_hardcoded\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop MobSF
        if: always()
        run: docker rm -f mobsf || true

      - name: Upload MobSF report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-scorecard.json
          retention-days: 90

  attest:
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: built-apk
      artifact-path: ${{ needs.build.outputs.path }}

  release:
    needs: [build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      - name: Create release notes
        id: release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "${{ needs.build.outputs.path }},${{ needs.build.outputs.idsig }}"
          immutableCreate: true
          prerelease: true
