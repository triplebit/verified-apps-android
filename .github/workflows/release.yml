# Builds a signed release APK and publishes it to a GitHub Release.
# Signing material is in secrets/android-signing.yaml; SOPS_AGE_KEY decrypts it.

name: Build Release

on:
  push:
    tags:
      - "[0-9][0-9].[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      path: ${{ steps.apk.outputs.path }}
      idsig: ${{ steps.apk.outputs.idsig }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      # First, so an unpopulated secrets store fails before toolchain setup.
      - name: Load signing secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          bash scripts/ci/sops-env.sh secrets/android-signing.yaml \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - name: Verify version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          GRADLE_VERSION=$(awk '
            /releaseVersionYear =/{ y=$NF }
            /releaseVersionMonth =/{ m=$NF }
            /releaseVersionPatch =/{ p=$NF; sub(/,.*/, "", p) }
            END { printf "%d.%d.%d", y, m, p }
          ' app/build.gradle.kts)
          if [ "$GRADLE_VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch: app/build.gradle.kts is ${GRADLE_VERSION}, but release tag is ${TAG}."
            exit 1
          fi
          echo "Version ${GRADLE_VERSION} matches tag ${TAG}."

      - name: Prepare release keystore
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64. Populate secrets/android-signing.yaml before publishing."
            exit 1
          fi
          umask 077
          KEYSTORE_PATH="${{ runner.temp }}/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
        id: keystore

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        # SOURCE_DATE_EPOCH pinned to the tag commit for reproducible builds.
        run: SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) ./gradlew :app:assembleRelease --no-daemon

      - name: Package release APK
        id: apk
        env:
          TAG: ${{ github.ref_name }}
        run: |
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/app-release.apk"
          IDSIG_SRC="app/build/outputs/apk/release/app-release.apk.idsig"
          if [ -f "$SIGNED" ]; then
            APK="$SIGNED"
          elif [ -f "$UNSIGNED" ]; then
            echo "::error::Release APK is unsigned. Check the values in secrets/android-signing.yaml and the signing config."
            exit 1
          else
            echo "::error::No release APK found under app/build/outputs/apk/release/"
            exit 1
          fi
          if [ ! -f "$IDSIG_SRC" ]; then
            echo "::error::APK Signature Scheme v4 sidecar (.idsig) not found. Ensure enableV4Signing = true in the release signing config."
            exit 1
          fi
          APK_ASSET="VerifiedApps-${TAG}.apk"
          IDSIG_ASSET="VerifiedApps-${TAG}.apk.idsig"
          cp "$APK" "$APK_ASSET"
          cp "$IDSIG_SRC" "$IDSIG_ASSET"
          echo "path=${APK_ASSET}" >> "$GITHUB_OUTPUT"
          echo "idsig=${IDSIG_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.idsig }}

  mobsf:
    name: MobSF Security Scan
    needs: build
    runs-on: ubuntu-latest
    # Informational only; the release job doesn't depend on it. MOBSF_API_KEY
    # isn't a secret: the container is localhost-only and dies with the job.
    env:
      MOBSF_API_KEY: ci-ephemeral-key
    steps:
      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      # Not a `services:` container: MobSF's slow boot exceeds the service
      # healthcheck window, so we start it here and own the readiness wait.
      - name: Start MobSF
        run: |
          docker run -d --name mobsf \
            -e MOBSF_API_KEY="$MOBSF_API_KEY" \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8000/; then
              echo "MobSF is up after $((i * 5))s."
              exit 0
            fi
            sleep 5
          done
          echo "::error::MobSF did not become ready within 300s."
          docker logs mobsf
          exit 1

      - name: Scan APK
        run: |
          APK="${{ needs.build.outputs.path }}"
          echo "Scanning: $APK"

          HASH=$(curl -sf -F "file=@$APK" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/upload | jq -r .hash)
          echo "Upload hash: $HASH"

          curl -sf -X POST --max-time 600 \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scan > /dev/null

          # Suppress two confirmed library-only false positives before pulling
          # the scorecard. Non-fatal so an API change can't fail this job.
          for RULE in android_insecure_random android_hardcoded; do
            if curl -s -X POST \
              -d "hash=$HASH" \
              -d "type=code" \
              -d "rule=$RULE" \
              -H "Authorization: $MOBSF_API_KEY" \
              http://localhost:8000/api/v1/suppress_by_rule | jq -e '.response == "ok"' > /dev/null; then
              echo "Suppressed false-positive rule: $RULE"
            else
              echo "::warning::Could not suppress rule $RULE (MobSF API may have changed)"
            fi
          done

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/report_json > mobsf-report.json

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scorecard > mobsf-scorecard.json

          echo "## MobSF AppSec Scorecard" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security score: $(jq -r '.security_score // "N/A"' mobsf-scorecard.json)/100" >> "$GITHUB_STEP_SUMMARY"
          echo "- High: $(jq -r '.high | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Warning: $(jq -r '.warning | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Info: $(jq -r '.info | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Suppressed false positives (library-only): \`android_insecure_random\`, \`android_hardcoded\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop MobSF
        if: always()
        run: docker rm -f mobsf || true

      - name: Upload MobSF report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-scorecard.json
          retention-days: 90

  attest:
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: built-apk
      # Attest both the APK and its .idsig sidecar.
      artifact-path: |
        ${{ needs.build.outputs.path }}
        ${{ needs.build.outputs.idsig }}

  # Play variant; soft-skips when Play isn't configured.
  play:
    needs: build
    uses: ./.github/workflows/release-play.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit

  attest-play:
    needs: play
    if: needs.play.outputs.configured == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: built-play-aab
      artifact-path: ${{ needs.play.outputs.asset_name }}

  release:
    needs: [build, attest, play]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      # May be absent when Play isn't configured.
      - name: Download Play App Bundle
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-play-aab

      # Immutable release: all assets must be present at creation.
      - name: Collect release assets
        id: assets
        env:
          MAIN_APK: ${{ needs.build.outputs.path }}
          MAIN_IDSIG: ${{ needs.build.outputs.idsig }}
          PLAY_AAB: ${{ needs.play.outputs.asset_name }}
        run: |
          LIST="${MAIN_APK},${MAIN_IDSIG}"
          if [ -n "$PLAY_AAB" ] && [ -f "$PLAY_AAB" ]; then
            LIST="${LIST},${PLAY_AAB}"
            echo "Including Play App Bundle: ${PLAY_AAB}"
          else
            echo "No Play App Bundle to include (Play not configured or skipped)."
          fi
          echo "artifacts=${LIST}" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        id: release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: ${{ steps.assets.outputs.artifacts }}
          immutableCreate: true
          prerelease: false
