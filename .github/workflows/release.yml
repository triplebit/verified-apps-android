# Builds a signed release APK and publishes it to a GitHub Release.
# Signing material is in secrets/android-signing.yaml; SOPS_AGE_KEY decrypts it.

name: Build Release

on:
  push:
    tags:
      - "[0-9][0-9].[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      path: ${{ steps.apk.outputs.path }}
      idsig: ${{ steps.apk.outputs.idsig }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      # First, so an unpopulated secrets store fails before toolchain setup.
      - name: Load signing secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          bash scripts/ci/sops-env.sh secrets/android-signing.yaml \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Verify version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          GRADLE_VERSION=$(awk '
            /releaseVersionYear =/{ y=$NF }
            /releaseVersionMonth =/{ m=$NF }
            /releaseVersionPatch =/{ p=$NF; sub(/,.*/, "", p) }
            END { printf "%d.%d.%d", y, m, p }
          ' app/build.gradle.kts)
          if [ "$GRADLE_VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch: app/build.gradle.kts is ${GRADLE_VERSION}, but release tag is ${TAG}."
            exit 1
          fi
          echo "Version ${GRADLE_VERSION} matches tag ${TAG}."

      - name: Prepare release keystore
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64. Populate secrets/android-signing.yaml before publishing."
            exit 1
          fi
          umask 077
          KEYSTORE_PATH="${{ runner.temp }}/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
        id: keystore

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        # SOURCE_DATE_EPOCH pinned to the tag commit for reproducible builds.
        run: SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) ./gradlew :app:assembleRelease --no-daemon

      - name: Package release APK
        id: apk
        env:
          TAG: ${{ github.ref_name }}
        run: |
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/app-release.apk"
          IDSIG_SRC="app/build/outputs/apk/release/app-release.apk.idsig"
          if [ -f "$SIGNED" ]; then
            APK="$SIGNED"
          elif [ -f "$UNSIGNED" ]; then
            echo "::error::Release APK is unsigned. Check the values in secrets/android-signing.yaml and the signing config."
            exit 1
          else
            echo "::error::No release APK found under app/build/outputs/apk/release/"
            exit 1
          fi
          if [ ! -f "$IDSIG_SRC" ]; then
            echo "::error::APK Signature Scheme v4 sidecar (.idsig) not found. Ensure enableV4Signing = true in the release signing config."
            exit 1
          fi
          APK_ASSET="VerifiedApps-${TAG}.apk"
          IDSIG_ASSET="VerifiedApps-${TAG}.apk.idsig"
          cp "$APK" "$APK_ASSET"
          cp "$IDSIG_SRC" "$IDSIG_ASSET"
          echo "path=${APK_ASSET}" >> "$GITHUB_OUTPUT"
          echo "idsig=${IDSIG_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.idsig }}

  mobsf:
    name: MobSF Security Scan
    needs: build
    runs-on: ubuntu-latest
    # Informational only; the release job doesn't depend on it. MOBSF_API_KEY
    # isn't a secret: the container is localhost-only and dies with the job.
    env:
      MOBSF_API_KEY: ci-ephemeral-key
    steps:
      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      # Not a `services:` container: MobSF's slow boot exceeds the service
      # healthcheck window, so we start it here and own the readiness wait.
      - name: Start MobSF
        run: |
          docker run -d --name mobsf \
            -e MOBSF_API_KEY="$MOBSF_API_KEY" \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8000/; then
              echo "MobSF is up after $((i * 5))s."
              exit 0
            fi
            sleep 5
          done
          echo "::error::MobSF did not become ready within 300s."
          docker logs mobsf
          exit 1

      - name: Scan APK
        run: |
          APK="${{ needs.build.outputs.path }}"
          echo "Scanning: $APK"

          HASH=$(curl -sf -F "file=@$APK" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/upload | jq -r .hash)
          echo "Upload hash: $HASH"

          curl -sf -X POST --max-time 600 \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scan > /dev/null

          # Suppress two confirmed library-only false positives before pulling
          # the scorecard. Non-fatal so an API change can't fail this job.
          for RULE in android_insecure_random android_hardcoded; do
            if curl -s -X POST \
              -d "hash=$HASH" \
              -d "type=code" \
              -d "rule=$RULE" \
              -H "Authorization: $MOBSF_API_KEY" \
              http://localhost:8000/api/v1/suppress_by_rule | jq -e '.response == "ok"' > /dev/null; then
              echo "Suppressed false-positive rule: $RULE"
            else
              echo "::warning::Could not suppress rule $RULE (MobSF API may have changed)"
            fi
          done

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/report_json > mobsf-report.json

          curl -sf -X POST \
            -d "hash=$HASH" \
            -H "Authorization: $MOBSF_API_KEY" \
            http://localhost:8000/api/v1/scorecard > mobsf-scorecard.json

          echo "## MobSF AppSec Scorecard" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security score: $(jq -r '.security_score // "N/A"' mobsf-scorecard.json)/100" >> "$GITHUB_STEP_SUMMARY"
          echo "- High: $(jq -r '.high | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Warning: $(jq -r '.warning | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Info: $(jq -r '.info | length // 0' mobsf-scorecard.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Suppressed false positives (library-only): \`android_insecure_random\`, \`android_hardcoded\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop MobSF
        if: always()
        run: docker rm -f mobsf || true

      - name: Upload MobSF report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mobsf-security-report
          path: |
            mobsf-report.json
            mobsf-scorecard.json
          retention-days: 90

  attest:
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: built-apk
      # Attest both the APK and its .idsig sidecar.
      artifact-path: |
        ${{ needs.build.outputs.path }}
        ${{ needs.build.outputs.idsig }}

  # Play variant; soft-skips when Play isn't configured. Scoped secrets, not
  # `inherit`: the Play workflow only needs the SOPS key. Runs in parallel
  # with build (it builds its own bundle from the tag); the release job
  # gates on both. Build only — the upload to Play happens in play-upload,
  # after the GitHub release is published.
  play:
    uses: ./.github/workflows/release-play.yml
    with:
      tag: ${{ github.ref_name }}
      upload: false
    secrets:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

  attest-play:
    needs: play
    if: needs.play.outputs.configured == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: built-play-aab
      artifact-path: ${{ needs.play.outputs.asset_name }}

  release:
    # attest-play must finish before the release publishes the AAB it covers
    # (it's skipped, not failed, when Play isn't configured — hence the
    # explicit result checks instead of plain `needs` semantics).
    needs: [build, attest, play, attest-play]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.attest.result == 'success' &&
      needs.play.result == 'success' &&
      (needs.attest-play.result == 'success' || needs.attest-play.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-apk

      # The artifact only exists when Play is configured, and then the
      # immutable release must include the attested AAB — so this is skipped
      # rather than continue-on-error, and a download failure is fatal.
      - name: Download Play App Bundle
        if: needs.play.outputs.configured == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-play-aab

      # Immutable release: all assets must be present at creation.
      - name: Collect release assets
        id: assets
        env:
          MAIN_APK: ${{ needs.build.outputs.path }}
          MAIN_IDSIG: ${{ needs.build.outputs.idsig }}
          PLAY_AAB: ${{ needs.play.outputs.asset_name }}
        run: |
          LIST="${MAIN_APK},${MAIN_IDSIG}"
          if [ -n "$PLAY_AAB" ]; then
            if [ ! -f "$PLAY_AAB" ]; then
              echo "::error::Play is configured but ${PLAY_AAB} is not present; refusing to publish the immutable release without it."
              exit 1
            fi
            LIST="${LIST},${PLAY_AAB}"
            echo "Including Play App Bundle: ${PLAY_AAB}"
          else
            echo "No Play App Bundle to include (Play not configured)."
          fi
          echo "artifacts=${LIST}" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        id: release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: ${{ steps.assets.outputs.artifacts }}
          draft: true
          prerelease: false
          body: |
            Verified Apps is an app signing certificate hash viewer and verifier. It checks your installed apps (or any APK file) against a built-in database of known-good app signing fingerprints.

            You can share or copy verification info for use outside the app. If an app is not in the database, you'll have the option to open a pre-filled GitHub submission issue in your browser.

            This is a fork of [AppVerifier](https://github.com/soupslurpr/AppVerifier), but many components have been removed, so it no longer serves the same purpose. Notably, it no longer includes peer-to-peer verification via clipboard sharing. This app **only** checks apps against our crowdsourced database.

            [<img src="https://raw.githubusercontent.com/ImranR98/Obtainium/b1c8ac6f2ab08497189721a788a5763e28ff64cd/assets/graphics/badge_obtainium.png"
                alt="Get it on Obtainium"
                height="80">](https://apps.obtainium.imranr.dev/redirect?r=obtainium://app/%7B%22id%22%3A%22org.privacyguides.verifiedapps%22%2C%22url%22%3A%22https%3A%2F%2Fgithub.com%2Fprivacyguides%2Fverified-apps-android%22%2C%22author%22%3A%22privacyguides%22%2C%22name%22%3A%22Verified%20Apps%22%2C%22preferredApkIndex%22%3A0%2C%22additionalSettings%22%3A%22%7B%5C%22includePrereleases%5C%22%3Atrue%2C%5C%22fallbackToOlderReleases%5C%22%3Atrue%2C%5C%22filterReleaseTitlesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22filterReleaseNotesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22verifyLatestTag%5C%22%3Afalse%2C%5C%22sortMethodChoice%5C%22%3A%5C%22date%5C%22%2C%5C%22useLatestAssetDateAsReleaseDate%5C%22%3Afalse%2C%5C%22releaseTitleAsVersion%5C%22%3Atrue%2C%5C%22trackOnly%5C%22%3Afalse%2C%5C%22versionExtractionRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22matchGroupToUse%5C%22%3A%5C%22%5C%22%2C%5C%22versionDetection%5C%22%3Atrue%2C%5C%22releaseDateAsVersion%5C%22%3Afalse%2C%5C%22useVersionCodeAsOSVersion%5C%22%3Afalse%2C%5C%22apkFilterRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22invertAPKFilter%5C%22%3Afalse%2C%5C%22autoApkFilterByArch%5C%22%3Atrue%2C%5C%22appName%5C%22%3A%5C%22%5C%22%2C%5C%22appAuthor%5C%22%3A%5C%22%5C%22%2C%5C%22shizukuPretendToBeGooglePlay%5C%22%3Afalse%2C%5C%22allowInsecure%5C%22%3Afalse%2C%5C%22exemptFromBackgroundUpdates%5C%22%3Afalse%2C%5C%22skipUpdateNotifications%5C%22%3Afalse%2C%5C%22about%5C%22%3A%5C%22%5C%22%2C%5C%22refreshBeforeDownload%5C%22%3Afalse%2C%5C%22includeZips%5C%22%3Afalse%2C%5C%22zippedApkFilterRegEx%5C%22%3A%5C%22%5C%22%7D%22%2C%22overrideSource%22%3Anull%7D)[<img src="https://f-droid.org/badge/get-it-on.png"
                alt="Get it on F-Droid"
                height="80">](https://privacyguides.github.io/fdroid/repo/)[<img src="https://camo.githubusercontent.com/6db97bf4a0c8091913dc2c6374c9531d2ce6bb5ebe39874f39bc023b6bebc122/68747470733a2f2f6769746c61622e636f6d2f497a7a794f6e44726f69642f7265706f2f2d2f7261772f6d61737465722f6173736574732f497a7a794f6e44726f69642e706e67" height="80" alt="Get it at IzzyOnDroid">](https://apt.izzysoft.de/fdroid/index/apk/org.privacyguides.verifiedapps)

            ```
            org.privacyguides.verifiedapps
            40:5C:6B:D2:CA:7C:3A:AE:8F:46:3C:6F:8B:55:BC:F0:DD:AC:43:1C:5E:D8:EA:FF:65:D1:06:C9:81:7A:20:7F
            ```

            **This app shouldn't/can't be used to verify itself.** We do not recommend any specific way to verify the signing certificate of the APK file you've downloaded. However, many people use an AppVerifier install they trust to check the signatures of their APK files. Obtainium is another app which can display the signing certificate of apps it's downloaded.

            ---

            [<img src="https://raw.githubusercontent.com/steverichey/google-play-badge-svg/266d2b2df26f10d3c00b8129a0bd9f6da6b19f00/img/en_get.svg"
                alt="Get it on Google Play"
                height="80">](https://play.google.com/store/apps/details?id=org.privacyguides.verifiedapps.play)

            Google Play builds are now available for open testing: <https://play.google.com/apps/testing/org.privacyguides.verifiedapps.play>

            ```
            org.privacyguides.verifiedapps.play
            E8:58:37:5B:7C:45:CF:C1:D4:E4:F5:1B:4A:D6:59:73:5B:38:2C:82:4F:E2:24:48:36:A8:14:AD:7A:F3:00:61
            ```

  # Uploads the attested App Bundle to Google Play only after the GitHub
  # release is published, so a tag whose canonical release fails never
  # reaches Play. A failure here can't affect the already-published release;
  # retry the upload by dispatching the 'Build & Publish to Google Play'
  # workflow for this tag.
  play-upload:
    needs: [play, release]
    if: >-
      !cancelled() &&
      needs.release.result == 'success' &&
      needs.play.outputs.configured == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Tag-push trigger, so this checks out the same tag commit the play job
      # built from (fastlane config + versionCode source).
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      - name: Load Play secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: bash scripts/ci/sops-env.sh secrets/google-play.yaml PLAY_SERVICE_ACCOUNT_JSON

      - name: Set up Ruby & fastlane
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Download Play App Bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-play-aab

      - name: Prepare Play service account
        id: secrets
        run: |
          umask 077
          JSON_PATH="${{ runner.temp }}/play-service-account.json"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > "$JSON_PATH"
          echo "json=${JSON_PATH}" >> "$GITHUB_OUTPUT"

      # Lets the upload lane treat an already-uploaded versionCode as success,
      # so re-running a tag after a partial failure isn't rejected by Play.
      - name: Compute version code
        id: vc
        run: |
          CODE=$(awk '
            /releaseVersionYear =/{ y=$NF }
            /releaseVersionMonth =/{ m=$NF }
            /releaseVersionPatch =/{ p=$NF; sub(/,.*/, "", p) }
            END { if (y && m && p != "") printf "%d", y * 1000000 + m * 10000 + p }
          ' app/build.gradle.kts)
          if ! [[ "$CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not derive versionCode from app/build.gradle.kts (got '${CODE}')."
            exit 1
          fi
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "versionCode ${CODE}"

      # Same track/status the play workflow defaults to on dispatch: draft on
      # the internal track, so a human still confirms rollout.
      - name: Upload App Bundle to Google Play
        env:
          PLAY_JSON_KEY_FILE: ${{ steps.secrets.outputs.json }}
          PLAY_AAB_PATH: ${{ needs.play.outputs.asset_name }}
          PLAY_TRACK: internal
          PLAY_RELEASE_STATUS: draft
          PLAY_VERSION_CODE: ${{ steps.vc.outputs.code }}
        run: bundle exec fastlane internal

      - name: Remove decrypted Play secrets
        if: always()
        run: rm -f "${{ runner.temp }}/play-service-account.json"
