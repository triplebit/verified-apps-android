name: Dependency Submission

on:
  push:
    branches: [main]

permissions:
  contents: write # required to submit the dependency graph snapshot

jobs:
  dependency-submission:
    name: Submit dependency graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      # Report only the dependencies that ship in the release APK. The full
      # Gradle graph also contains AGP's build-time tooling — apksig/bouncycastle,
      # sdklib (jdom2/httpclient/commons-lang3), and the Unified Test Platform
      # (netty/jose4j) — none of which reach the app, so scoping to
      # releaseRuntimeClasspath keeps Dependabot focused on what users actually
      # run. This REPLACES the built-in "Automatic dependency submission"
      # feature, which must be disabled (repo Settings -> Advanced Security)
      # so it doesn't keep submitting the unfiltered graph.
      - uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph-include-configurations: '^releaseRuntimeClasspath$'
