name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # the semgrep-action wrapper is deprecated, so we will run natively :/
      - name: Install Semgrep
        run: pipx install semgrep

      # semgrep scan exits 0 even when it reports findings, so the SARIF upload
      # still runs; it only exits non-zero on a real scan error.
      - name: Run Semgrep
        run: >-
          semgrep scan
          --config p/kotlin
          --config p/secrets
          --config p/owasp-top-ten
          --sarif --output semgrep.sarif

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      # exit 0 for same reason as semgrep
      - name: Run Detekt
        run: ./gradlew :app:detekt

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && hashFiles('app/build/reports/detekt/detekt.sarif') != ''
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      # Verifies security-critical signature-match logic, the database lookup,
      # and the fingerprint formatter. Will fail workflow on failure.
      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

  python-tests:
    name: Python script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run database generator tests
        run: python -m unittest discover -s .github/scripts -p 'test_*.py' -v
