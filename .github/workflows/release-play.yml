# Builds the Google Play variant and uploads its App Bundle to Play, and
# attaches the signed bundle to the GitHub release for provenance. Called by
# release.yml and also dispatchable on its own. Soft-skips when Play isn't
# configured. Play values are in secrets/google-play.yaml (SOPS_AGE_KEY
# decrypts them).

name: Build & Publish to Google Play

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "CalVer tag to build (YY.MM.PATCH). Blank = latest release."
        required: false
        default: ""
      track:
        description: "Play track to publish to."
        required: false
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]
      release_status:
        description: "Play release status."
        required: false
        default: "draft"
        type: choice
        options: [draft, completed, halted, inProgress]
  workflow_call:
    inputs:
      tag:
        description: "CalVer tag to build. Blank = latest release."
        required: false
        default: ""
        type: string
      track:
        required: false
        default: "internal"
        type: string
      release_status:
        required: false
        default: "draft"
        type: string
    outputs:
      configured:
        description: "Whether Play secrets were present and the build ran."
        value: ${{ jobs.play.outputs.configured }}
      asset_name:
        description: "Filename of the produced -play.aab (empty if skipped)."
        value: ${{ jobs.play.outputs.asset_name }}
      uploaded:
        description: "Whether the upload to Play succeeded ('false' when skipped or failed)."
        value: ${{ jobs.play.outputs.uploaded }}
    secrets:
      SOPS_AGE_KEY:
        description: "age key for secrets/google-play.yaml. Optional: absent means soft-skip."
        required: false

permissions:
  contents: read

env:
  # SHA-256 certificate fingerprint of the Play upload key (keytool format,
  # colon-separated uppercase hex). Not a secret — pinned in plaintext so a
  # wrong keystore in secrets/google-play.yaml fails the build instead of
  # signing with an unintended key. Update when rotating the upload keystore;
  # see secrets/README.md.
  PLAY_UPLOAD_CERT_SHA256: "A8:8C:9D:24:0E:58:26:66:FB:E4:A0:E0:C1:A2:85:1A:84:F7:AE:21:5D:2F:95:52:65:94:0D:BE:39:B9:11:F3"

jobs:
  play:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.cfg.outputs.configured }}
      asset_name: ${{ steps.aab.outputs.name }}
      uploaded: ${{ steps.upload.outcome == 'success' }}
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided and no releases found."
            exit 1
          fi
          # CalVer only: rejects arbitrary refs (this workflow runs with the
          # Play secrets) and keeps the output single-line.
          if ! [[ "$TAG" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]+$ ]]; then
            echo "::error::Tag '${TAG}' is not a CalVer YY.MM.PATCH release tag."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building Play artifacts for tag ${TAG}."

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      # Soft-skip gate when Play isn't configured: all values unpopulated means
      # not configured, a partial set is a misconfiguration and fails here
      # rather than mid-build. Pipes to grep for an exit code rather than
      # capturing plaintext into a variable.
      - name: Check Play configuration
        id: cfg
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          populated() {
            # decryptable, non-empty, and not the CHANGEME placeholder
            sops decrypt --extract "[\"$1\"]" \
              secrets/google-play.yaml 2>/dev/null | grep -q . || return 1
            ! sops decrypt --extract "[\"$1\"]" \
              secrets/google-play.yaml 2>/dev/null | grep -qxF 'CHANGEME'
          }
          if [ -z "$SOPS_AGE_KEY" ] || [ ! -f secrets/google-play.yaml ]; then
            echo "::warning::SOPS_AGE_KEY or secrets/google-play.yaml missing; skipping Play build and upload."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A key that can't decrypt the file is an error, not "unconfigured".
          if ! sops decrypt secrets/google-play.yaml > /dev/null 2>&1; then
            echo "::error::Cannot decrypt secrets/google-play.yaml. Does SOPS_AGE_KEY match a recipient in .sops.yaml?"
            exit 1
          fi
          KEYS="PLAY_SERVICE_ACCOUNT_JSON PLAY_UPLOAD_KEYSTORE_BASE64 \
            PLAY_UPLOAD_KEYSTORE_PASSWORD PLAY_UPLOAD_KEY_ALIAS PLAY_UPLOAD_KEY_PASSWORD"
          MISSING=""
          PRESENT=0
          for key in $KEYS; do
            if populated "$key"; then
              PRESENT=$((PRESENT + 1))
            else
              MISSING="${MISSING} ${key}"
            fi
          done
          if [ "$PRESENT" -eq 0 ]; then
            echo "::warning::secrets/google-play.yaml is unpopulated; skipping Play build and upload."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$MISSING" ]; then
            echo "::error::secrets/google-play.yaml is partially populated; missing:${MISSING}. Populate every key or none."
            exit 1
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK
        if: steps.cfg.outputs.configured == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        if: steps.cfg.outputs.configured == 'true'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        if: steps.cfg.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - name: Set up Ruby & fastlane
        if: steps.cfg.outputs.configured == 'true'
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Load Play secrets
        if: steps.cfg.outputs.configured == 'true'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          bash scripts/ci/sops-env.sh secrets/google-play.yaml \
            PLAY_SERVICE_ACCOUNT_JSON \
            PLAY_UPLOAD_KEYSTORE_BASE64 \
            PLAY_UPLOAD_KEYSTORE_PASSWORD \
            PLAY_UPLOAD_KEY_ALIAS \
            PLAY_UPLOAD_KEY_PASSWORD

      - name: Prepare Play upload keystore & service account
        id: secrets
        if: steps.cfg.outputs.configured == 'true'
        run: |
          if [ -z "$PLAY_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::Missing PLAY_UPLOAD_KEYSTORE_BASE64 in secrets/google-play.yaml."
            exit 1
          fi
          umask 077
          KEYSTORE_PATH="${{ runner.temp }}/play-upload.keystore"
          JSON_PATH="${{ runner.temp }}/play-service-account.json"
          echo "$PLAY_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > "$JSON_PATH"
          echo "keystore=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
          echo "json=${JSON_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build Play App Bundle
        if: steps.cfg.outputs.configured == 'true'
        env:
          PLAY_UPLOAD_KEYSTORE_PATH: ${{ steps.secrets.outputs.keystore }}
        # SOURCE_DATE_EPOCH pinned to the tag commit for reproducible builds.
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
            ./gradlew :app:bundleRelease -PplayBuild=true --no-daemon

      - name: Package Play App Bundle
        id: aab
        if: steps.cfg.outputs.configured == 'true'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB" ]; then
            echo "::error::No App Bundle found at $AAB"
            exit 1
          fi
          # Verify the bundle is signed before publishing.
          if ! jarsigner -verify "$AAB" 2>&1 | grep -q "jar verified"; then
            echo "::error::Play App Bundle is unsigned. Check the PLAY_UPLOAD_* values in secrets/google-play.yaml."
            exit 1
          fi
          # jarsigner only proves *a* valid signature; pin the signer to the
          # intended upload key so a wrong keystore in the secrets store can't
          # publish (or, on a first upload, enroll) under the wrong identity.
          ACTUAL=$(keytool -printcert -jarfile "$AAB" | awk '/SHA256:/ { print $2; exit }')
          if [ -z "$ACTUAL" ]; then
            echo "::error::Could not read the signer certificate from ${AAB}."
            exit 1
          fi
          if [ "$PLAY_UPLOAD_CERT_SHA256" = "CHANGEME" ]; then
            echo "::error::PLAY_UPLOAD_CERT_SHA256 is not pinned in release-play.yml. This bundle's signer is ${ACTUAL}; verify it against the upload keystore (keytool -list -v) before pinning."
            exit 1
          fi
          if [ "$ACTUAL" != "$PLAY_UPLOAD_CERT_SHA256" ]; then
            echo "::error::Bundle signer ${ACTUAL} does not match the pinned upload certificate ${PLAY_UPLOAD_CERT_SHA256}."
            exit 1
          fi
          AAB_ASSET="VerifiedApps-${TAG}-play.aab"
          cp "$AAB" "$AAB_ASSET"
          echo "name=${AAB_ASSET}" >> "$GITHUB_OUTPUT"

      # Lets the upload lane treat an already-uploaded versionCode as success,
      # so re-running a tag after a partial failure isn't rejected by Play.
      - name: Compute version code
        id: vc
        if: steps.cfg.outputs.configured == 'true'
        run: |
          CODE=$(awk '
            /releaseVersionYear =/{ y=$NF }
            /releaseVersionMonth =/{ m=$NF }
            /releaseVersionPatch =/{ p=$NF; sub(/,.*/, "", p) }
            END { if (y && m && p != "") printf "%d", y * 1000000 + m * 10000 + p }
          ' app/build.gradle.kts)
          if ! [[ "$CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not derive versionCode from app/build.gradle.kts (got '${CODE}')."
            exit 1
          fi
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "versionCode ${CODE}"

      # On dispatch a failure fails the run directly. When called from
      # release.yml it must not block the GitHub release — the caller surfaces
      # a failed upload through the `uploaded` output instead.
      - name: Upload App Bundle to Google Play
        id: upload
        if: steps.cfg.outputs.configured == 'true'
        continue-on-error: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          PLAY_JSON_KEY_FILE: ${{ steps.secrets.outputs.json }}
          PLAY_AAB_PATH: app/build/outputs/bundle/release/app-release.aab
          PLAY_TRACK: ${{ inputs.track }}
          PLAY_RELEASE_STATUS: ${{ inputs.release_status }}
          PLAY_VERSION_CODE: ${{ steps.vc.outputs.code }}
        run: bundle exec fastlane internal

      - name: Remove decrypted Play secrets
        if: always()
        run: rm -f "${{ runner.temp }}/play-upload.keystore" "${{ runner.temp }}/play-service-account.json"

      - name: Upload Play App Bundle artifact
        if: steps.cfg.outputs.configured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-play-aab
          path: ${{ steps.aab.outputs.name }}
