# ONE-TIME migration helper — DELETE once secrets/*.yaml hold real values
# (see secrets/MIGRATION.md). Re-encrypts the existing GitHub Actions secrets
# to the age recipients in .sops.yaml and uploads them as an encrypted
# artifact, so the values can be committed without retrieving them by hand.

name: Export Actions secrets to SOPS (one-time)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      - name: Re-encrypt GitHub secrets to the age recipient
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_UPLOAD_KEYSTORE_BASE64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
          PLAY_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEYSTORE_PASSWORD }}
          PLAY_UPLOAD_KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
          PLAY_UPLOAD_KEY_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
          ACTIONS_SSH_KEY: ${{ secrets.ACTIONS_SSH_KEY }}
          CB_SYNC_TOKEN: ${{ secrets.CB_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          set +x      # never echo the plaintext secrets this step handles
          umask 077

          # Warn (by name only) on any unset secret.
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD \
                   ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD \
                   PLAY_SERVICE_ACCOUNT_JSON PLAY_UPLOAD_KEYSTORE_BASE64 \
                   PLAY_UPLOAD_KEYSTORE_PASSWORD PLAY_UPLOAD_KEY_ALIAS \
                   PLAY_UPLOAD_KEY_PASSWORD ACTIONS_SSH_KEY CB_SYNC_TOKEN; do
            if [ -z "${!v:-}" ]; then
              echo "::warning::GitHub secret $v is empty or unset; it will export as an empty value."
            fi
          done

          mkdir -p export

          # jq builds the plaintext JSON; sops encrypts it to the YAML the
          # workflows consume. --filename-override picks up the secrets/ rule
          # from .sops.yaml. Plaintext stays in RUNNER_TEMP.
          encrypt() { # <output-name> <jq-object-expression>
            local out="$1" expr="$2" tmp
            tmp="$RUNNER_TEMP/$out.json"
            jq -n "$expr" > "$tmp"
            sops encrypt --filename-override "secrets/$out" \
              --input-type json --output-type yaml "$tmp" > "export/$out"
            rm -f "$tmp"
            echo "Encrypted export/$out"
          }

          encrypt android-signing.yaml '{
            ANDROID_KEYSTORE_BASE64: env.ANDROID_KEYSTORE_BASE64,
            ANDROID_KEYSTORE_PASSWORD: env.ANDROID_KEYSTORE_PASSWORD,
            ANDROID_KEY_ALIAS: env.ANDROID_KEY_ALIAS,
            ANDROID_KEY_PASSWORD: env.ANDROID_KEY_PASSWORD
          }'

          encrypt google-play.yaml '{
            PLAY_SERVICE_ACCOUNT_JSON: env.PLAY_SERVICE_ACCOUNT_JSON,
            PLAY_UPLOAD_KEYSTORE_BASE64: env.PLAY_UPLOAD_KEYSTORE_BASE64,
            PLAY_UPLOAD_KEYSTORE_PASSWORD: env.PLAY_UPLOAD_KEYSTORE_PASSWORD,
            PLAY_UPLOAD_KEY_ALIAS: env.PLAY_UPLOAD_KEY_ALIAS,
            PLAY_UPLOAD_KEY_PASSWORD: env.PLAY_UPLOAD_KEY_PASSWORD
          }'

          encrypt codeberg.yaml '{
            ACTIONS_SSH_KEY: env.ACTIONS_SSH_KEY,
            CB_SYNC_TOKEN: env.CB_SYNC_TOKEN
          }'

      - name: Upload encrypted export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sops-migration-export
          path: export/
          retention-days: 1
