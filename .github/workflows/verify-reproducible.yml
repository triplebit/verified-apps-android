# From https://github.com/RoundSalmon4/AppVerifierBG/blob/feature/all-enhancements/.github/workflows/verify-reproducible.yml

name: Verify Reproducible Build
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'CalVer tag to verify (YY.MM.PATCH, e.g. 26.6.1). Leave blank for latest.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$INPUT_TAG" ]; then
            TAG=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases?per_page=1" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['tag_name'])" 2>/dev/null || true)
            if [ -z "$TAG" ]; then
              echo "error=true" >> "$GITHUB_OUTPUT"
            else
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: List recent releases
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Recent releases:"
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=5" \
            | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
            print(f'  {r[\"tag_name\"]}')
          "

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Download original release APK
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern '*.apk' \
            --dir /tmp/original

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Rebuild APK from tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^[0-9][0-9]\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unrecognized tag format: $TAG (expected CalVer YY.MM.PATCH, e.g. 26.6.0)"
            exit 1
          fi
          # The version is baked into app/build.gradle.kts at this tag, so no
          # version override is needed — just rebuild from the checked-out source.
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
            ./gradlew :app:assembleRelease --rerun-tasks

      - name: Compare APKs
        run: |
          set -x
          ORIGINAL=$(ls /tmp/original/*.apk 2>/dev/null || true)
          REBUILT=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null || true)
          if [ -z "$ORIGINAL" ] || [ -z "$REBUILT" ]; then
            echo "Missing APK files" >&2
            echo "## Verify Result - ERROR" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing original or rebuilt APK" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          RESULT=$(python3 .github/scripts/compare_apks.py "$ORIGINAL" "$REBUILT")
          echo "$RESULT"
          {
            echo "## Verify Result"
            echo ""
            echo "**Tag:** ${{ steps.tag.outputs.tag }}"
            echo ""
            echo "**Original:** $(basename "$ORIGINAL") ($(stat --format=%s "$ORIGINAL") bytes)"
            echo "**Rebuilt:**  $(basename "$REBUILT") ($(stat --format=%s "$REBUILT") bytes)"
            echo ""
            echo '```'
            echo "$RESULT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if echo "$RESULT" | grep -q "All non-signature files match"; then
            echo "### ✅ Reproducible — all non-signature files match!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ NOT reproducible — files differ" >> "$GITHUB_STEP_SUMMARY"
          fi
