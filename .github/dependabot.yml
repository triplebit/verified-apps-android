version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
          - "com.google.accompanist*"
      compose-bom:
        patterns:
          - "androidx.compose:compose-bom"
      kotlin:
        patterns:
          - "com.android.application"
          - "org.jetbrains.kotlin.plugin.compose"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # Internal reusable workflow with no release tags to anchor to; without a
      # version, Dependabot follows commits (dependabot-core#13466). Bump its
      # pinned SHA manually when privacyguides/.github changes.
      - dependency-name: "privacyguides/.github/.github/workflows/sign-artifact.yml"
